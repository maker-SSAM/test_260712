<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OpenSCAD 웹 파라매트릭 테스트 - 치수 표시</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; display: flex; }
        #controls { width: 300px; padding: 20px; background: #f5f5f5; border-radius: 8px; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #viewer { width: 600px; height: 400px; background: #eee; margin-left: 20px; border-radius: 8px; position: relative; overflow: hidden; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; }
        /* 💡 3D 치수 글씨 스타일링 */
        .dim-label { color: #ff5722; font-weight: bold; font-size: 14px; background: rgba(255,255,255,0.8); padding: 2px 6px; border-radius: 4px; border: 1px solid #ff5722; }
    </style>
</head>
<body>

    <div id="controls">
        <h3>직육면체 수치 조절 (mm)</h3>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">* 기능 추가: 실시간 3D 치수선 및 수치(mm) 표시</p>
        <div class="control-group">
            <label>가로 (X): <span id="valX">50</span>mm</label>
            <input type="range" id="sizeX" min="10" max="150" value="50" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>세로 (Y): <span id="valY">50</span>mm</label>
            <input type="range" id="sizeY" min="10" max="150" value="50" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>높이 (Z): <span id="valZ">32</span>mm</label>
            <input type="range" id="sizeZ" min="5" max="100" value="30" oninput="updateModel()">
        </div>
    </div>

    <div id="viewer"></div>

    <script>
        const container = document.getElementById('viewer');
        
        // 3D 씬 설정
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(45, 600 / 400, 1, 1000);
        camera.position.set(100, 100, 150);

        // 기본 3D 렌더러
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(600, 400);
        container.appendChild(renderer.domElement);

        // 💡 [변경점 1] 글씨 표시용 CSS2D 렌더러 설정 및 추가
        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(600, 400);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; // 마우스 클릭 방해 금지
        container.appendChild(labelRenderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 조명
        const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
        light1.position.set(1, 1.5, 0.5).normalize();
        scene.add(light1);
        const ambientLight = new THREE.AmbientLight(0x606060);
        scene.add(ambientLight);

        let modelGroup;

        // 글씨(레이블) 생성 함수
        function createLabel(text) {
            const div = document.createElement('div');
            div.className = 'dim-label';
            div.textContent = text;
            return new THREE.CSS2DObject(div);
        }

        function updateModel() {
            const x = parseFloat(document.getElementById('sizeX').value);
            const y = parseFloat(document.getElementById('sizeY').value);
            const z = parseFloat(document.getElementById('sizeZ').value);

            document.getElementById('valX').innerText = x;
            document.getElementById('valY').innerText = y;
            document.getElementById('valZ').innerText = z;

            if (modelGroup) scene.remove(modelGroup);
            modelGroup = new THREE.Group();

            // 상자 생성
            const geometry = new THREE.BoxGeometry(x, z, y); 
            const material = new THREE.MeshStandardMaterial({ color: 0x3388dd, roughness: 0.3, metalness: 0.1 });
            const cubeMesh = new THREE.Mesh(geometry, material);
            modelGroup.add(cubeMesh);

            // 외곽선 생성
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
            modelGroup.add(line);

            // 💡 [변경점 2] 실시간 치수 글씨 생성 및 위치 계산
            const xLabel = createLabel(`${x} mm`);
            xLabel.position.set(0, -z/2 - 10, y/2 + 5); // 가로 측정 위치
            modelGroup.add(xLabel);

            const yLabel = createLabel(`${y} mm`);
            yLabel.position.set(x/2 + 10, -z/2, 0); // 세로 측정 위치
            modelGroup.add(yLabel);

            const zLabel = createLabel(`${z} mm`);
            zLabel.position.set(-x/2 - 10, 0, y/2 + 5); // 높이 측정 위치
            modelGroup.add(zLabel);

            scene.add(modelGroup);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera); // 💡 글씨 레이러도 같이 렌더링
        }

        updateModel();
        animate();
    </script>
</body>
</html>
