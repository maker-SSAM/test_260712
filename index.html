<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OpenSCAD 웹 파라매트릭 테스트 - 입체감 개선</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; display: flex; }
        #controls { width: 300px; padding: 20px; background: #f5f5f5; border-radius: 8px; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #viewer { width: 600px; height: 400px; background: #eee; margin-left: 20px; border-radius: 8px; position: relative; overflow: hidden; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; }
    </style>
</head>
<body>

    <div id="controls">
        <h3>직육면체 수치 조절 (mm)</h3>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">* 입체감 개선: 윤곽선(Edges) 추가 및 조명 고도화</p>
        <div class="control-group">
            <label>가로 (X): <span id="valX">50</span>mm</label>
            <input type="range" id="sizeX" min="10" max="150" value="50" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>세로 (Y): <span id="valY">50</span>mm</label>
            <input type="range" id="sizeY" min="10" max="150" value="50" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>높이 (Z): <span id="valZ">31</span>mm</label>
            <input type="range" id="sizeZ" min="5" max="100" value="30" oninput="updateModel()">
        </div>
    </div>

    <div id="viewer"></div>

    <script>
        const container = document.getElementById('viewer');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0); // 배경색을 더 밝게

        const camera = new THREE.PerspectiveCamera(45, 600 / 400, 1, 1000);
        camera.position.set(100, 100, 150);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(600, 400);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 부드러운 움직임 추가

        // 💡 [변경점 1: 조명 고도화] 더 입체적인 그림자를 위해 조명 추가 및 방향 수정
        const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
        light1.position.set(1, 1.5, 0.5).normalize(); // 사선 방향 조명
        scene.add(light1);

        const light2 = new THREE.DirectionalLight(0xffffff, 0.4);
        light2.position.set(-1, -0.5, -0.5).normalize(); // 반대편 보조 조명
        scene.add(light2);

        const ambientLight = new THREE.AmbientLight(0x606060); // 전체적인 밝기 향상
        scene.add(ambientLight);

        // 생성될 직육면체와 윤곽선을 담을 그룹
        let modelGroup;

        function updateModel() {
            const x = parseFloat(document.getElementById('sizeX').value);
            const y = parseFloat(document.getElementById('sizeY').value);
            const z = parseFloat(document.getElementById('sizeZ').value);

            document.getElementById('valX').innerText = x;
            document.getElementById('valY').innerText = y;
            document.getElementById('valZ').innerText = z;

            // 이전 모델 삭제
            if (modelGroup) scene.remove(modelGroup);
            modelGroup = new THREE.Group();

            // OpenSCAD의 cube([x, y, z])와 동일한 크기 로직 (X, Z, Y 매칭)
            const geometry = new THREE.BoxGeometry(x, z, y); 

            // 💡 [변경점 2: 면 색상 재질 변경] 조명에 더 민감하게 반응하는 재질로 변경 (MeshStandardMaterial)
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x3388dd, // 파란색 톤 조정
                roughness: 0.3, // 표면 질감 설정 (빛 반사)
                metalness: 0.1 
            });
            const cubeMesh = new THREE.Mesh(geometry, material);
            modelGroup.add(cubeMesh);

            // 💡 [변경점 3: 중요 - 윤곽선(Edges) 추가] 각 모서리에 선명한 선 추가
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 })); // 흰색 선
            modelGroup.add(line);

            scene.add(modelGroup);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        updateModel();
        animate();
    </script>
</body>
</html>
