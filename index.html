<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OpenSCAD 웹 파라매트릭 테스트</title>
    <script src="https://unpkg.com/@jscad/modeling@2.2.0/dist/index.min.js"></script>
    <script src="https://unpkg.com/@jscad/regl-renderer@2.2.0/dist/index.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; display: flex; }
        #controls { width: 300px; padding: 20px; background: #f5f5f5; border-radius: 8px; }
        #viewer { width: 600px; height: 400px; background: #eee; margin-left: 20px; border-radius: 8px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; }
    </style>
</head>
<body>

    <div id="controls">
        <h3>직육면체 수치 조절 (mm)</h3>
        <div class="control-group">
            <label>가로 (X): <span id="valX">50</span>mm</label>
            <input type="range" id="sizeX" min="10" max="150" value="50" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>세로 (Y): <span id="valY">50</span>mm</label>
            <input type="range" id="sizeY" min="10" max="150" value="50" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>높이 (Z): <span id="valZ">30</span>mm</label>
            <input type="range" id="sizeZ" min="5" max="100" value="30" oninput="updateModel()">
        </div>
    </div>

    <div id="viewer"></div>

    <script>
        // 이 영역에서 웹 브라우저가 UI 슬라이더 값에 따라 3D 형태를 실시간으로 그려냅니다.
        // 현재는 웹 표준 JSCAD 엔진을 활용하여 OpenSCAD의 cube([x, y, z])와 동일한 원리로 구동됩니다.
        const { cube } = jscadModeling.primitives;
        const { renderer } = jscadReglRenderer;

        const container = document.getElementById('viewer');
        const render = renderer({ container });

        function updateModel() {
            const x = parseFloat(document.getElementById('sizeX').value);
            const y = parseFloat(document.getElementById('sizeY').value);
            const z = parseFloat(document.getElementById('sizeZ').value);

            document.getElementById('valX').innerText = x;
            document.getElementById('valY').innerText = y;
            document.getElementById('valZ').innerText = z;

            // OpenSCAD의 cube(size=[x,y,z]) 역할을 하는 부분
            const myCube = cube({ size: [x, y, z] });
            render({ solids: [myCube] });
        }

        // 초기 실행
        updateModel();
    </script>
</body>
</html>
