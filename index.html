<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OpenSCAD 웹 파라매트릭 테스트 - 평면 치수 고도화</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; display: flex; }
        #controls { width: 300px; padding: 20px; background: #f5f5f5; border-radius: 8px; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #viewer { width: 600px; height: 400px; background: #eee; margin-left: 20px; border-radius: 8px; position: relative; overflow: hidden; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; }
    </style>
</head>
<body>

    <div id="controls">
        <h3>직육면체 수치 조절 (mm)</h3>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">* 기능 추가: Z축 세로 안내선 및 평면에 누운 입체 텍스트 표시</p>
        <div class="control-group">
            <label>가로 (X): <span id="valX">50</span>mm</label>
            <input type="range" id="sizeX" min="10" max="150" value="50" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>세로 (Y): <span id="valY">50</span>mm</label>
            <input type="range" id="sizeY" min="10" max="150" value="50" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>높이 (Z): <span id="valZ">30</span>mm</label>
            <input type="range" id="sizeZ" min="5" max="100" value="30" oninput="updateModel()">
        </div>
    </div>

    <div id="viewer"></div>

    <script>
        const container = document.getElementById('viewer');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f5);

        const camera = new THREE.PerspectiveCamera(45, 600 / 400, 1, 1000);
        camera.position.set(120, 150, 200);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(600, 400);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 조명
        const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
        light1.position.set(1, 2, 1).normalize();
        scene.add(light1);
        const ambientLight = new THREE.AmbientLight(0x707070);
        scene.add(ambientLight);

        // 바닥 격자 및 기본 축
        const gridHelper = new THREE.GridHelper(300, 30, 0xaaaaaa, 0xcccccc);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        let modelGroup;

        // 💡 [변경점 1] 글씨를 평면(스티커)으로 만들기 위해 캔버스 이미지를 생성하는 텍스트 함수
        function create3DTextPlane(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fillRect(0, 0, 128, 64);
            ctx.strokeStyle = '#ff5722';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 128, 64);
            ctx.font = 'bold 24px sans-serif';
            ctx.fillStyle = '#ff5722';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 32);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide, transparent: true });
            const geometry = new THREE.PlaneGeometry(24, 12);
            return new THREE.Mesh(geometry, material);
        }

        function updateModel() {
            const x = parseFloat(document.getElementById('sizeX').value);
            const y = parseFloat(document.getElementById('sizeY').value);
            const z = parseFloat(document.getElementById('sizeZ').value);

            document.getElementById('valX').innerText = x;
            document.getElementById('valY').innerText = y;
            document.getElementById('valZ').innerText = z;

            if (modelGroup) scene.remove(modelGroup);
            modelGroup = new THREE.Group();

            // 상자 및 윤곽선
            const geometry = new THREE.BoxGeometry(x, z, y); 
            const material = new THREE.MeshStandardMaterial({ color: 0x3388dd, roughness: 0.4, metalness: 0.1 });
            const cubeMesh = new THREE.Mesh(geometry, material);
            cubeMesh.position.y = z / 2;
            modelGroup.add(cubeMesh);

            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
            line.position.y = z / 2;
            modelGroup.add(line);

            // 💡 [변경점 2] Z축 크기 가늠 세로 안내선 추가 (상자 왼쪽 뒤 모서리 근처에 배치)
            const zLineGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-x/2 - 10, 0, y/2 + 10),
                new THREE.Vector3(-x/2 - 10, z, y/2 + 10)
            ]);
            const zLine = new THREE.Line(zLineGeo, new THREE.LineBasicMaterial({ color: 0xff5722, linewidth: 2 }));
            modelGroup.add(zLine);

            // 💡 [변경점 3] 각 글씨 평면을 3D 좌표평면 각도에 맞게 회전시켜 눕히기
            // 가로(X) 치수: 바닥에 눕힘
            const xLabel = create3DTextPlane(`${x} mm`);
            xLabel.position.set(0, 0.5, y/2 + 15); 
            xLabel.rotation.x = -Math.PI / 2; // 바닥 평면에 눕히기
            modelGroup.add(xLabel);

            // 세로(Y) 치수: 바닥에 눕힘
            const yLabel = create3DTextPlane(`${y} mm`);
            yLabel.position.set(x/2 + 15, 0.5, 0); 
            yLabel.rotation.x = -Math.PI / 2; 
            yLabel.rotation.z = Math.PI / 2; // 세로 방향 정렬
            modelGroup.add(yLabel);

            // 높이(Z) 치수: 세로 가이드라인 옆에 수직 벽면 평면으로 세움
            const zLabel = create3DTextPlane(`${z} mm`);
            zLabel.position.set(-x/2 - 25, z/2, y/2 + 10); 
            zLabel.rotation.y = Math.PI / 4; // 카메라를 비스듬히 바라보도록 세우기
            modelGroup.add(zLabel);

            scene.add(modelGroup);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        updateModel();
        animate();
    </script>
</body>
</html>
